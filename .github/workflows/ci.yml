name: CI
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pre-commit-checks:
    name: Pre-commit Checks
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Set up pixi
        uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
        with:
          environments: default lint
      - name: pre-commit
        run: pixi run pre-commit-run --color=always --show-diff-on-failure

  quality-gates:
    name: Quality Gates
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Set up pixi
        uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
        with:
          environments: default
      - name: Install repository
        run: pixi run postinstall
      - name: Ruff
        run: pixi run lint
      - name: Ruff format check
        run: pixi run format-check
      - name: Mypy
        run: pixi run typecheck
      - name: Materialized presets
        run: pixi run materialize-check
      - name: Experiment plans
        run: pixi run experiment-plans-check
      - name: Typos
        run: pixi run typos --force-exclude
      - name: TOML format
        run: pixi run metadata-check
      - name: Artifact policy for pull requests
        if: github.event_name == 'pull_request'
        run: pixi run artifact-policy-check --base-ref origin/${{ github.base_ref }}
      - name: Artifact policy for pushes
        if: github.event_name == 'push'
        run: pixi run artifact-policy-check --base-ref ${{ github.event.before == '0000000000000000000000000000000000000000' && 'HEAD^' || github.event.before }}

  unit-tests:
    name: Unit Tests (${{ contains(matrix.os, 'ubuntu') && 'Linux' || 'macOS' }}) - ${{ matrix.environment }}
    timeout-minutes: 30
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        environment: [default]
    steps:
      - name: Checkout branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up pixi
        uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
        with:
          environments: ${{ matrix.environment }}
      - name: Install repository
        run: pixi run -e ${{ matrix.environment }} postinstall
      - name: Run pytest
        run: pixi run -e ${{ matrix.environment }} test
